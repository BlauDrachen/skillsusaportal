<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Home Portal</title>
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🏠 My Portal</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html">Services</a>
      <a class="nav-link" href="exercises.html">Programming Exercises</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <header class="text-center mb-5">
    <h1 class="display-4 fw-bold text-success">🚀 Local Services</h1>
    <p class="lead text-secondary">All my self-hosted tools — accessible via reverse proxy</p>
  </header>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="services-grid"></div>
</div>

<!-- Local Bootstrap JS -->
<script src="js/bootstrap.bundle.min.js"></script>
<script>
    // Your services array (add your real local domains here)
    const services = [
        { name: "Portainer", url: "http://portainer.local", desc: "Docker container management", img: "https://via.placeholder.com/400x220/006400/ffffff?text=Portainer" },
        { name: "Plex", url: "http://plex.local", desc: "Media streaming server", img: "https://via.placeholder.com/400x220/990000/ffffff?text=Plex" },
        { name: "Nextcloud", url: "http://nextcloud.local", desc: "Personal file sync & share", img: "https://via.placeholder.com/400x220/004488/ffffff?text=Nextcloud" },
        // Add more as needed
    ];

    const grid = document.getElementById('services-grid');

    services.forEach(service => {
        const col = document.createElement('div');
        col.className = "col";
        col.innerHTML = `
        <a href="${service.url}" target="_blank" class="text-decoration-none">
          <div class="card bg-secondary text-light h-100 border-0 shadow-sm">
            <img src="${service.img}" class="card-img-top" alt="${service.name}" style="height: 180px; object-fit: cover;">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${service.name}</h5>
              <p class="card-text flex-grow-1">${service.desc}</p>
              <span class="btn btn-success btn-sm w-100">Open ${service.name}</span>
            </div>
          </div>
        </a>
      `;
        grid.appendChild(col);
    });
</script>
</body>
</html>

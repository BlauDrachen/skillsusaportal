<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Home Portal</title>
  <link href="css/style.css" rel="stylesheet">

  <!-- Bootstrap Icons - Fully Local -->
  <link href="icons/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">SkillsUSA Portal</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html">Services</a>
      <a class="nav-link" href="exercises.html">Programming Exercises</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <header class="text-center mb-5">
    <h1 class="display-4 fw-bold text-success">Computer Programming 2026</h1>
    <p class="lead text-secondary">All my self-hosted tools — accessible via reverse proxy</p>
  </header>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="services-grid"></div>
</div>

<!-- Local Bootstrap JS -->
<script src="js/bootstrap.bundle.min.js"></script>
<script>
    // Your services array (add your real local domains here)
    const services = [
        { name: "Test", url: "http://qst.skillsusa.il", desc: "Step 1. Take the multiple choice test", icon: "bi bi-box-seam-fill" },
        { name: "Exercises", url: "exercises.html", desc: "Step 2. All 4 exercises are listed here", icon: "bi bi-box-seam-fill" },
        { name: "Upload Code", url: "http://fb.skillsusa.il", desc: "Step 3. Submit your completed programs", icon: "bi bi-box-seam-fill" },
        // Add more as needed
    ];

    const grid = document.getElementById('services-grid');

    services.forEach(service => {
        const col = document.createElement('div');
        col.className = "col";
        col.innerHTML = `
        <a href="${service.url}" target="_blank" class="text-decoration-none">
          <div class="card bg-secondary text-light h-100 border-0 shadow-sm">
            <div class="card-body d-flex flex-column align-items-center text-center p-4">
              <i class="${service.icon} display-1 text-success mb-3"></i>
              <h5 class="card-title">${service.name}</h5>
              <p class="card-text flex-grow-1">${service.desc}</p>
              <span class="btn btn-success btn-sm w-100">Open →</span>
            </div>
          </div>
        </a>
      `;
        grid.appendChild(col);
    });
</script>
</body>
</html>

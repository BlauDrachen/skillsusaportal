<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programming Exercises</title>
  <link href="css/style.css" rel="stylesheet">
  <link href="icons/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🏠 My Portal</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html">Services</a>
      <a class="nav-link active" href="exercises.html">Programming Exercises</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <h1 class="display-5 fw-bold mb-4 text-center">📚 Programming Exercises</h1>

  <!-- Exercise Cards -->
  <div class="row g-4 mb-5" id="exercises-grid"></div>

  <!-- Detailed Explanations -->
  <h3 class="mb-4">📋 Problem Details</h3>
  <div class="accordion" id="detailsAccordion"></div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script>
    const exercises = [
        {
            id: 1,
            title: "Problem 1: Sum from 1 to N",
            difficulty: "Easy",
            icon: "bi bi-plus-circle",
            desc: "Write a program that asks the user for a single positive integer n (1 ≤ n ≤ 10,000).",
            fullDesc: `Write a program that asks the user for a single positive integer n (1 ≤ n ≤ 10,000).<br>
Your program should calculate and print the sum of all integers from 1 to n.<br><br>
Example:<br>
Input: 5<br>
Output: 15`
        },
        {
            id: 2,
            title: "Problem 2: Power of Two Checker",
            difficulty: "Easy",
            icon: "bi bi-lightning",
            desc: "Write a program that asks the user for a positive integer.",
            fullDesc: `Write a program that asks the user for a positive integer.<br>
Print “Yes” if the number is a power of two (including 1 = 2^0), otherwise print “No”.<br><br>
Examples:<br>
Input: 16<br>
Output: Yes<br>
Input: 20<br>
Output: No<br>
Input: 1<br>
Output: Yes`
        },
        {
            id: 3,
            title: "Problem 3: Inventory Management CLI",
            difficulty: "Medium",
            icon: "bi bi-box-seam",
            desc: "Inventory Management practices data structures (lists or dictionaries/maps), menus, and state management.",
            fullDesc: `Inventory Management practices data structures (lists or dictionaries/maps), menus, and state management.<br><br>
Problem: Inventory Management CLI<br>
Write a program that simulates a simple command-line inventory management system.<br>
The program should repeatedly display a menu with these options:<br>
Add an item<br>
Remove an item (reduce quantity)<br>
View all items<br>
Show total inventory value<br>
Exit<br><br>
Each item must have:<br>
Name (string)<br>
Quantity (positive integer)<br>
Unit price (positive number, can include decimals)`
        },
        {
            id: 4,
            title: "Problem 4: Data Compression Simulator",
            difficulty: "Hard",
            icon: "bi bi-file-zip",
            desc: "Write a program that implements a basic Run-Length Encoding (RLE) compression algorithm.",
            fullDesc: `Write a program that implements a basic Run-Length Encoding (RLE) compression algorithm and its decompression.<br><br>
The program should:<br>
Ask the user for a string to compress (or read from input)<br>
Apply Run-Length Encoding: replace sequences of identical characters with the count followed by the character (e.g., "AAABBCCCC" becomes "3A2B4C")<br>
Display the compressed string and the compression ratio (original length vs. compressed length)<br>
Then decompress the compressed string back to the original and display it to verify correctness.<br><br>
Example:<br>
Input string: AAABBCCCDDDD<br>
Compressed: 3A2B3C4D<br>
Decompressed: AAABBCCCDDDD (should match original)`
        }
    ];

    // Render Cards
    const grid = document.getElementById('exercises-grid');
    exercises.forEach(ex => {
        const col = document.createElement('div');
        col.className = "col-md-6 col-lg-4";
        col.innerHTML = `
        <div class="card bg-secondary text-light h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <i class="${ex.icon} display-4 text-success"></i>
              <span class="badge bg-${ex.difficulty === 'Easy' ? 'success' : ex.difficulty === 'Medium' ? 'warning' : 'danger'}">${ex.difficulty}</span>
            </div>
            <h5 class="card-title mt-3">${ex.title}</h5>
            <p class="card-text">${ex.desc}</p>
          </div>
          <div class="card-footer bg-transparent border-0">
            <button class="btn btn-outline-light btn-sm w-100"
                    data-bs-toggle="collapse"
                    data-bs-target="#detail-${ex.id}">
              Show Details
            </button>
          </div>
        </div>
      `;
        grid.appendChild(col);
    });

    // Render Detailed Accordion
    const accordion = document.getElementById('detailsAccordion');
    exercises.forEach(ex => {
        const item = document.createElement('div');
        item.className = "accordion-item bg-secondary border-0 mb-2";
        item.innerHTML = `
        <h2 class="accordion-header">
          <button class="accordion-button collapsed bg-secondary text-light" type="button"
                  data-bs-toggle="collapse" data-bs-target="#detail-${ex.id}">
            ${ex.title}
            <span class="badge bg-${ex.difficulty === 'Easy' ? 'success' : ex.difficulty === 'Medium' ? 'warning' : 'danger'} ms-2">${ex.difficulty}</span>
          </button>
        </h2>
        <div id="detail-${ex.id}" class="accordion-collapse collapse" data-bs-parent="#detailsAccordion">
          <div class="accordion-body">
            ${ex.fullDesc}
          </div>
        </div>
      `;
        accordion.appendChild(item);
    });
</script>
</body>
</html>
